<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="mirrorGloss" cx="20%" cy="12%" r="55%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="35%"  stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="folderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c2d3da"/>
      <stop offset="50%" stop-color="#a8bcc6"/>
      <stop offset="100%" stop-color="#8ea4ae"/>
    </linearGradient>
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#fafcfd"/>
      <stop offset="100%" stop-color="#e4ecf0"/>
    </linearGradient>
    <linearGradient id="topInnerHL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="20%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bottomInnerSH" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="70%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="pageTopHL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="20%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="pageShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="16"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feColorMatrix values="0.05 0 0 0 0  0 0.10 0 0 0  0 0 0.20 0 0  0 0 0 1 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="folderShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dx="4" dy="18"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="enclosure"><rect width="1024" height="1024" rx="230" ry="230"/></clipPath>
    <clipPath id="folderClip"><rect x="280" y="240" width="560" height="660" rx="56" ry="56"/></clipPath>
    <clipPath id="pageClip"><rect x="200" y="170" width="560" height="660" rx="56" ry="56"/></clipPath>
  </defs>

  <g clip-path="url(#enclosure)">
    <!-- White-anchored grid -->
    <rect x="0"   y="0"   width="205" height="205" fill="#dde7eb"/>
    <rect x="205" y="0"   width="205" height="205" fill="#e8eff2"/>
    <rect x="410" y="0"   width="205" height="205" fill="#f0f5f7"/>
    <rect x="615" y="0"   width="205" height="205" fill="#f7f9fa"/>
    <rect x="820" y="0"   width="204" height="205" fill="#ffffff"/>
    <rect x="0"   y="205" width="205" height="205" fill="#d0dde2"/>
    <rect x="205" y="205" width="205" height="205" fill="#dde7eb"/>
    <rect x="410" y="205" width="205" height="205" fill="#e8eff2"/>
    <rect x="615" y="205" width="205" height="205" fill="#f0f5f7"/>
    <rect x="820" y="205" width="204" height="205" fill="#f7f9fa"/>
    <rect x="0"   y="410" width="205" height="205" fill="#c0d0d6"/>
    <rect x="205" y="410" width="205" height="205" fill="#d0dde2"/>
    <rect x="410" y="410" width="205" height="205" fill="#dde7eb"/>
    <rect x="615" y="410" width="205" height="205" fill="#e8eff2"/>
    <rect x="820" y="410" width="204" height="205" fill="#f0f5f7"/>
    <rect x="0"   y="615" width="205" height="205" fill="#abbfc7"/>
    <rect x="205" y="615" width="205" height="205" fill="#c0d0d6"/>
    <rect x="410" y="615" width="205" height="205" fill="#d0dde2"/>
    <rect x="615" y="615" width="205" height="205" fill="#dde7eb"/>
    <rect x="820" y="615" width="204" height="205" fill="#e8eff2"/>
    <rect x="0"   y="820" width="205" height="204" fill="#95acb6"/>
    <rect x="205" y="820" width="205" height="204" fill="#abbfc7"/>
    <rect x="410" y="820" width="205" height="204" fill="#c0d0d6"/>
    <rect x="615" y="820" width="205" height="204" fill="#d0dde2"/>
    <rect x="820" y="820" width="204" height="204" fill="#dde7eb"/>

    <!-- Glass mirror gloss -->
    <rect width="1024" height="1024" fill="url(#mirrorGloss)"/>
    <ellipse cx="160" cy="100" rx="280" ry="160" fill="#ffffff" opacity="0.30"/>

    <!-- Folder back -->
    <g filter="url(#folderShadow)">
      <rect x="280" y="240" width="560" height="660" rx="56" ry="56" fill="url(#folderGrad)"/>
    </g>
    <g clip-path="url(#folderClip)">
      <rect x="280" y="240" width="560" height="200" fill="url(#topInnerHL)"/>
      <rect x="280" y="240" width="560" height="660" fill="url(#bottomInnerSH)"/>
    </g>
    <rect x="280" y="240" width="560" height="660" rx="56" ry="56" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>

    <!-- Page -->
    <g filter="url(#pageShadow)">
      <rect x="200" y="170" width="560" height="660" rx="56" ry="56" fill="url(#pageGrad)"/>
    </g>
    <g clip-path="url(#pageClip)">
      <rect x="200" y="170" width="560" height="180" fill="url(#pageTopHL)"/>
      <rect x="200" y="170" width="560" height="660" fill="url(#bottomInnerSH)" opacity="0.4"/>
    </g>
    <rect x="200" y="170" width="560" height="660" rx="56" ry="56" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.7"/>

    <!-- ====== STRUCTURED SPEC SECTIONS (brand blue) ====== -->
    <g fill="#156082">
      <circle cx="270" cy="285" r="10"/>
      <rect x="300" y="276" width="320" height="20" rx="5"/>
      <rect x="300" y="316" width="380" height="12" rx="3"/>
      <rect x="300" y="344" width="330" height="12" rx="3"/>
      <rect x="300" y="372" width="400" height="12" rx="3"/>

      <circle cx="270" cy="435" r="10"/>
      <rect x="300" y="426" width="380" height="20" rx="5"/>
      <rect x="300" y="466" width="400" height="12" rx="3"/>
      <rect x="300" y="494" width="290" height="12" rx="3"/>

      <circle cx="270" cy="560" r="10"/>
      <rect x="300" y="551" width="350" height="20" rx="5"/>
      <rect x="300" y="591" width="380" height="12" rx="3"/>
      <rect x="300" y="619" width="420" height="12" rx="3"/>
      <rect x="300" y="647" width="320" height="12" rx="3"/>

      <circle cx="270" cy="700" r="10"/>
      <rect x="300" y="691" width="300" height="20" rx="5"/>
      <rect x="300" y="731" width="380" height="12" rx="3"/>
      <rect x="300" y="759" width="240" height="12" rx="3"/>
    </g>
  </g>
</svg>
