<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="mirrorGloss" cx="20%" cy="12%" r="55%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="35%"  stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="folderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a55626"/>
      <stop offset="50%" stop-color="#7a3e18"/>
      <stop offset="100%" stop-color="#4d260e"/>
    </linearGradient>
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#fcfaf8"/>
      <stop offset="100%" stop-color="#ede4dc"/>
    </linearGradient>
    <linearGradient id="topInnerHL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="20%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bottomInnerSH" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="70%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="pageTopHL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="20%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="pageShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="16"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feColorMatrix values="0.25 0 0 0 0  0 0.15 0 0 0  0 0 0.05 0 0  0 0 0 1 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="folderShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dx="4" dy="18"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="enclosure"><rect width="1024" height="1024" rx="230" ry="230"/></clipPath>
    <clipPath id="folderClip"><rect x="280" y="240" width="560" height="660" rx="56" ry="56"/></clipPath>
    <clipPath id="pageClip"><rect x="200" y="170" width="560" height="660" rx="56" ry="56"/></clipPath>
  </defs>

  <g clip-path="url(#enclosure)">
    <rect x="0"   y="0"   width="205" height="205" fill="#b8784a"/>
    <rect x="205" y="0"   width="205" height="205" fill="#cd9870"/>
    <rect x="410" y="0"   width="205" height="205" fill="#deb696"/>
    <rect x="615" y="0"   width="205" height="205" fill="#ebd2ba"/>
    <rect x="820" y="0"   width="204" height="205" fill="#f6e6dc"/>
    <rect x="0"   y="205" width="205" height="205" fill="#9c5a2a"/>
    <rect x="205" y="205" width="205" height="205" fill="#b8784a"/>
    <rect x="410" y="205" width="205" height="205" fill="#cd9870"/>
    <rect x="615" y="205" width="205" height="205" fill="#deb696"/>
    <rect x="820" y="205" width="204" height="205" fill="#ebd2ba"/>
    <rect x="0"   y="410" width="205" height="205" fill="#82451b"/>
    <rect x="205" y="410" width="205" height="205" fill="#9c5a2a"/>
    <rect x="410" y="410" width="205" height="205" fill="#b8784a"/>
    <rect x="615" y="410" width="205" height="205" fill="#cd9870"/>
    <rect x="820" y="410" width="204" height="205" fill="#deb696"/>
    <rect x="0"   y="615" width="205" height="205" fill="#5d2810"/>
    <rect x="205" y="615" width="205" height="205" fill="#82451b"/>
    <rect x="410" y="615" width="205" height="205" fill="#9c5a2a"/>
    <rect x="615" y="615" width="205" height="205" fill="#b8784a"/>
    <rect x="820" y="615" width="204" height="205" fill="#cd9870"/>
    <rect x="0"   y="820" width="205" height="204" fill="#421804"/>
    <rect x="205" y="820" width="205" height="204" fill="#5d2810"/>
    <rect x="410" y="820" width="205" height="204" fill="#82451b"/>
    <rect x="615" y="820" width="205" height="204" fill="#9c5a2a"/>
    <rect x="820" y="820" width="204" height="204" fill="#b8784a"/>

    <rect width="1024" height="1024" fill="url(#mirrorGloss)"/>
    <ellipse cx="160" cy="100" rx="280" ry="160" fill="#ffffff" opacity="0.30"/>

    <g filter="url(#folderShadow)">
      <rect x="280" y="240" width="560" height="660" rx="56" ry="56" fill="url(#folderGrad)"/>
    </g>
    <g clip-path="url(#folderClip)">
      <rect x="280" y="240" width="560" height="200" fill="url(#topInnerHL)"/>
      <rect x="280" y="240" width="560" height="660" fill="url(#bottomInnerSH)"/>
    </g>
    <rect x="280" y="240" width="560" height="660" rx="56" ry="56" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>

    <g filter="url(#pageShadow)">
      <rect x="200" y="170" width="560" height="660" rx="56" ry="56" fill="url(#pageGrad)"/>
    </g>
    <g clip-path="url(#pageClip)">
      <rect x="200" y="170" width="560" height="180" fill="url(#pageTopHL)"/>
      <rect x="200" y="170" width="560" height="660" fill="url(#bottomInnerSH)" opacity="0.4"/>
    </g>
    <rect x="200" y="170" width="560" height="660" rx="56" ry="56" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.7"/>

    <!-- ====== HUB-AND-SPOKE HEXAGONAL NETWORK ====== -->
    <!-- Connection lines (lighter orange, drawn behind) -->
    <g stroke="#d68345" stroke-width="18" stroke-linecap="round" fill="none">
      <line x1="480" y1="500" x2="480" y2="290"/>
      <line x1="480" y1="500" x2="310" y2="660"/>
      <line x1="480" y1="500" x2="650" y2="660"/>
    </g>

    <!-- Big central hexagon (the data hub) -->
    <g fill="#c4641a" stroke="#c4641a" stroke-width="22" stroke-linejoin="round">
      <path d="M 480 390 L 575.3 445 L 575.3 555 L 480 610 L 384.7 555 L 384.7 445 Z"/>
    </g>
    <!-- Inner data dot -->
    <circle cx="480" cy="500" r="22" fill="#ffffff"/>

    <!-- Satellite hexagons (3 connected nodes) -->
    <g fill="#c4641a" stroke="#c4641a" stroke-width="22" stroke-linejoin="round">
      <!-- Top -->
      <path d="M 480 220 L 540.6 255 L 540.6 325 L 480 360 L 419.4 325 L 419.4 255 Z"/>
      <!-- Bottom-left -->
      <path d="M 310 590 L 370.6 625 L 370.6 695 L 310 730 L 249.4 695 L 249.4 625 Z"/>
      <!-- Bottom-right -->
      <path d="M 650 590 L 710.6 625 L 710.6 695 L 650 730 L 589.4 695 L 589.4 625 Z"/>
    </g>
    <!-- Inner data dots on satellites -->
    <g fill="#ffffff">
      <circle cx="480" cy="290" r="14"/>
      <circle cx="310" cy="660" r="14"/>
      <circle cx="650" cy="660" r="14"/>
    </g>
  </g>
</svg>
