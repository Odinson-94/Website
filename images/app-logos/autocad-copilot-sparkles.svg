<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="mirrorGloss" cx="20%" cy="12%" r="55%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="35%"  stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <filter id="sparkleShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feColorMatrix values="0.10 0 0 0 0  0 0.02 0 0 0  0 0 0.02 0 0  0 0 0 1 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="sparkleGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="badgeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="3" dy="9"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="enclosure"><rect width="1024" height="1024" rx="230" ry="230"/></clipPath>

  </defs>

  <g clip-path="url(#enclosure)">
    <!-- 5x5 red grid -->
    <rect x="0"   y="0"   width="205" height="205" fill="#b85045"/>
    <rect x="205" y="0"   width="205" height="205" fill="#cd7670"/>
    <rect x="410" y="0"   width="205" height="205" fill="#de9c97"/>
    <rect x="615" y="0"   width="205" height="205" fill="#ebbfbe"/>
    <rect x="820" y="0"   width="204" height="205" fill="#f6dddd"/>
    <rect x="0"   y="205" width="205" height="205" fill="#a83532"/>
    <rect x="205" y="205" width="205" height="205" fill="#b85045"/>
    <rect x="410" y="205" width="205" height="205" fill="#cd7670"/>
    <rect x="615" y="205" width="205" height="205" fill="#de9c97"/>
    <rect x="820" y="205" width="204" height="205" fill="#ebbfbe"/>
    <rect x="0"   y="410" width="205" height="205" fill="#82221c"/>
    <rect x="205" y="410" width="205" height="205" fill="#a83532"/>
    <rect x="410" y="410" width="205" height="205" fill="#b85045"/>
    <rect x="615" y="410" width="205" height="205" fill="#cd7670"/>
    <rect x="820" y="410" width="204" height="205" fill="#de9c97"/>
    <rect x="0"   y="615" width="205" height="205" fill="#4a1410"/>
    <rect x="205" y="615" width="205" height="205" fill="#82221c"/>
    <rect x="410" y="615" width="205" height="205" fill="#a83532"/>
    <rect x="615" y="615" width="205" height="205" fill="#b85045"/>
    <rect x="820" y="615" width="204" height="205" fill="#cd7670"/>
    <rect x="0"   y="820" width="205" height="204" fill="#2c0808"/>
    <rect x="205" y="820" width="205" height="204" fill="#4a1410"/>
    <rect x="410" y="820" width="205" height="204" fill="#82221c"/>
    <rect x="615" y="820" width="205" height="204" fill="#a83532"/>
    <rect x="820" y="820" width="204" height="204" fill="#b85045"/>

    <rect width="1024" height="1024" fill="url(#mirrorGloss)"/>
    <ellipse cx="200" cy="140" rx="520" ry="300" fill="#ffffff" opacity="0.28"/>

    <!-- === AI SPARKLES === -->

    <!-- Big sparkle -->
    <g transform="translate(430, 450)" filter="url(#sparkleShadow)">
      <g fill="#ffffff">
        <path d="M0 -180 C12 -60, 60 -12, 180 0 C60 12, 12 60, 0 180 C-12 60, -60 12, -180 0 C-60 -12, -12 -60, 0 -180Z"/>
      </g>
    </g>

    <!-- Medium sparkle bottom-right -->
    <g transform="translate(700, 700)" filter="url(#sparkleShadow)">
      <g fill="#ffffff" opacity="0.82">
        <path d="M0 -110 C8 -38, 38 -8, 110 0 C38 8, 8 38, 0 110 C-8 38, -38 8, -110 0 C-38 -8, -8 -38, 0 -110Z"/>
      </g>
    </g>

    <!-- Small sparkle accent -->
    <g transform="translate(240, 280)">
      <g fill="#ffffff" opacity="0.60">
        <path d="M0 -55 C4 -18, 18 -4, 55 0 C18 4, 4 18, 0 55 C-4 18, -18 4, -55 0 C-18 -4, -4 -18, 0 -55Z"/>
      </g>
    </g>

    <!-- Tiny sparkle dot -->
    <g transform="translate(600, 310)">
      <g fill="#ffffff" opacity="0.45">
        <path d="M0 -30 C2 -10, 10 -2, 30 0 C10 2, 2 10, 0 30 C-2 10, -10 2, -30 0 C-10 -2, -2 -10, 0 -30Z"/>
      </g>
    </g>


