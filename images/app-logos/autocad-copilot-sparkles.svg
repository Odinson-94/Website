    <g transform="translate(680, 30) scale(0.62)" fill-rule="evenodd" clip-rule="evenodd">
      <g fill-rule="nonzero">
        <path d="M16 83.087C42.1 66.121 68.238 49.24 94.278 32.2c-.049 120.446.085 240.903-.061 361.348-10.229 6.811-20.64 13.343-30.856 20.178-13.172 8.197-26.174 16.687-39.066 25.334-2.542 1.776-5.279 3.236-8.137 4.428-.122-120.13.17-240.27-.158-360.4z" fill="#e85984"/>
