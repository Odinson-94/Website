        <path d="M277.42 134.365c2.458 5.874 3.43 12.223 5.413 18.255 7.273 25.894 14.972 51.691 21.941 77.682a1925.78 1925.78 0 01-53.673 0c8.246-32.109 17.891-63.865 26.32-95.937z" fill="#e51050"/>
        <path d="M252.475 107.327c16.943-.28 33.934-.365 50.876.049 14.388 43.846 28.169 87.898 42.472 131.78 7.93 25.481 16.614 50.73 24.24 76.308-12.856.231-25.724.146-38.58.073-6.081-18.037-11.53-36.293-17.258-54.451-23.851-.511-47.714-.134-71.565-.195-.583 1.423-1.18 2.846-1.642 4.33-4.658 16.772-9.56 33.471-14.388 50.194-12.576.329-25.176.232-37.752.037.596-3.637 1.63-7.188 2.858-10.654a533180.92 533180.92 0 0039.869-130.443c7.115-22.282 13.22-44.916 20.87-67.028m24.946 27.038c-8.429 32.072-18.074 63.828-26.32 95.937 17.891.256 35.794.244 53.673 0-6.969-25.991-14.668-51.788-21.94-77.682-1.983-6.032-2.956-12.381-5.413-18.255z" fill="#fff"/>
        <path d="M464.711 118.882c10.277-1.265 20.7-.62 31.027-.426.523 27.183.073 54.39.219 81.586 0 86.755.012 173.522 0 260.278-.061 6.458.23 12.916-.207 19.374-133.824.22-267.648-.012-401.472.11-7.942-.024-16.663-.754-22.83-6.337-4.62-4.342-8.209-10.326-8.063-16.845-.036-14.303-.012-28.594-.024-42.897 10.216-6.835 20.627-13.367 30.856-20.178 4.561.499 9.158.475 13.744.402 80.272-.012 160.545-.012 240.817-.012 38.58-.11 77.171.23 115.739-.159.73-9.024.133-18.073.304-27.11-.073-82.595.146-165.19-.11-247.786z" fill="#770829"/>
      </g>
    </g>
  </g>
</svg>
