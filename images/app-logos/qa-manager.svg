<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="mirrorGloss" cx="20%" cy="12%" r="55%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="35%"  stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="folderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5e2b9c"/>
      <stop offset="50%" stop-color="#44197a"/>
      <stop offset="100%" stop-color="#2c0f5e"/>
    </linearGradient>
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#fbfaff"/>
      <stop offset="100%" stop-color="#e6deef"/>
    </linearGradient>
    <linearGradient id="topInnerHL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="20%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bottomInnerSH" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="70%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="pageTopHL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="20%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="pageShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="16"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feColorMatrix values="0.15 0 0 0 0  0 0.05 0 0 0  0 0 0.20 0 0  0 0 0 1 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="folderShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dx="4" dy="18"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="enclosure"><rect width="1024" height="1024" rx="230" ry="230"/></clipPath>
    <clipPath id="folderClip"><rect x="280" y="240" width="560" height="660" rx="56" ry="56"/></clipPath>
    <clipPath id="pageClip"><rect x="200" y="170" width="560" height="660" rx="56" ry="56"/></clipPath>
  </defs>

  <g clip-path="url(#enclosure)">
    <rect x="0"   y="0"   width="205" height="205" fill="#8b5cf6"/>
    <rect x="205" y="0"   width="205" height="205" fill="#a78bfa"/>
    <rect x="410" y="0"   width="205" height="205" fill="#c4b5fd"/>
    <rect x="615" y="0"   width="205" height="205" fill="#ddd6fe"/>
    <rect x="820" y="0"   width="204" height="205" fill="#ede9fe"/>
    <rect x="0"   y="205" width="205" height="205" fill="#7c3aed"/>
    <rect x="205" y="205" width="205" height="205" fill="#8b5cf6"/>
    <rect x="410" y="205" width="205" height="205" fill="#a78bfa"/>
    <rect x="615" y="205" width="205" height="205" fill="#c4b5fd"/>
    <rect x="820" y="205" width="204" height="205" fill="#ddd6fe"/>
    <rect x="0"   y="410" width="205" height="205" fill="#6b21a8"/>
    <rect x="205" y="410" width="205" height="205" fill="#7c3aed"/>
    <rect x="410" y="410" width="205" height="205" fill="#8b5cf6"/>
    <rect x="615" y="410" width="205" height="205" fill="#a78bfa"/>
    <rect x="820" y="410" width="204" height="205" fill="#c4b5fd"/>
    <rect x="0"   y="615" width="205" height="205" fill="#4c1d95"/>
    <rect x="205" y="615" width="205" height="205" fill="#6b21a8"/>
    <rect x="410" y="615" width="205" height="205" fill="#7c3aed"/>
    <rect x="615" y="615" width="205" height="205" fill="#8b5cf6"/>
    <rect x="820" y="615" width="204" height="205" fill="#a78bfa"/>
    <rect x="0"   y="820" width="205" height="204" fill="#2c0f5e"/>
    <rect x="205" y="820" width="205" height="204" fill="#4c1d95"/>
    <rect x="410" y="820" width="205" height="204" fill="#6b21a8"/>
    <rect x="615" y="820" width="205" height="204" fill="#7c3aed"/>
    <rect x="820" y="820" width="204" height="204" fill="#8b5cf6"/>

    <rect width="1024" height="1024" fill="url(#mirrorGloss)"/>
    <ellipse cx="160" cy="100" rx="280" ry="160" fill="#ffffff" opacity="0.30"/>

    <g filter="url(#folderShadow)">
      <rect x="280" y="240" width="560" height="660" rx="56" ry="56" fill="url(#folderGrad)"/>
    </g>
    <g clip-path="url(#folderClip)">
      <rect x="280" y="240" width="560" height="200" fill="url(#topInnerHL)"/>
      <rect x="280" y="240" width="560" height="660" fill="url(#bottomInnerSH)"/>
    </g>
    <rect x="280" y="240" width="560" height="660" rx="56" ry="56" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>

    <g filter="url(#pageShadow)">
      <rect x="200" y="170" width="560" height="660" rx="56" ry="56" fill="url(#pageGrad)"/>
    </g>
    <g clip-path="url(#pageClip)">
      <rect x="200" y="170" width="560" height="180" fill="url(#pageTopHL)"/>
      <rect x="200" y="170" width="560" height="660" fill="url(#bottomInnerSH)" opacity="0.4"/>
    </g>
    <rect x="200" y="170" width="560" height="660" rx="56" ry="56" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.7"/>

    <!-- Amber warning triangle - complementary contrast against violet -->
    <path d="M 480 270 L 350 500 L 610 500 Z"
          fill="#e09e2c" stroke="#e09e2c" stroke-width="36"
          stroke-linejoin="round" stroke-linecap="round"/>
    <rect x="468" y="350" width="24" height="92" rx="12" fill="#ffffff"/>
    <circle cx="480" cy="470" r="14" fill="#ffffff"/>

    <!-- Checklist lines in brand violet -->
    <g fill="#7c3aed">
      <circle cx="285" cy="608" r="10"/>
      <rect x="310" y="599" width="380" height="18" rx="4"/>
      <circle cx="285" cy="658" r="10"/>
      <rect x="310" y="649" width="340" height="18" rx="4"/>
      <circle cx="285" cy="708" r="10"/>
      <rect x="310" y="699" width="400" height="18" rx="4"/>
      <circle cx="285" cy="758" r="10"/>
      <rect x="310" y="749" width="280" height="18" rx="4"/>
    </g>
  </g>
</svg>
