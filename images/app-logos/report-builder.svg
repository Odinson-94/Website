<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="mirrorGloss" cx="20%" cy="12%" r="55%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="35%"  stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="folderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a7a9c"/>
      <stop offset="50%" stop-color="#156082"/>
      <stop offset="100%" stop-color="#08405c"/>
    </linearGradient>
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#f6fafc"/>
      <stop offset="100%" stop-color="#dde8ed"/>
    </linearGradient>
    <linearGradient id="topInnerHL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="20%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bottomInnerSH" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="70%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="pageTopHL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="20%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="pageShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="16"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feColorMatrix values="0.05 0 0 0 0  0 0.15 0 0 0  0 0 0.25 0 0  0 0 0 1 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="folderShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dx="4" dy="18"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="enclosure"><rect width="1024" height="1024" rx="230" ry="230"/></clipPath>
    <clipPath id="folderClip"><rect x="280" y="240" width="560" height="660" rx="56" ry="56"/></clipPath>
    <clipPath id="pageClip"><rect x="200" y="170" width="560" height="660" rx="56" ry="56"/></clipPath>
  </defs>

  <g clip-path="url(#enclosure)">
    <!-- Grid: brand #156082 anchored palette -->
    <rect x="0"   y="0"   width="205" height="205" fill="#4595b8"/>
    <rect x="205" y="0"   width="205" height="205" fill="#6db1cd"/>
    <rect x="410" y="0"   width="205" height="205" fill="#95c8de"/>
    <rect x="615" y="0"   width="205" height="205" fill="#c3dfeb"/>
    <rect x="820" y="0"   width="204" height="205" fill="#e6f1f6"/>
    <rect x="0"   y="205" width="205" height="205" fill="#2a7a9c"/>
    <rect x="205" y="205" width="205" height="205" fill="#4595b8"/>
    <rect x="410" y="205" width="205" height="205" fill="#6db1cd"/>
    <rect x="615" y="205" width="205" height="205" fill="#95c8de"/>
    <rect x="820" y="205" width="204" height="205" fill="#c3dfeb"/>
    <rect x="0"   y="410" width="205" height="205" fill="#156082"/>
    <rect x="205" y="410" width="205" height="205" fill="#2a7a9c"/>
    <rect x="410" y="410" width="205" height="205" fill="#4595b8"/>
    <rect x="615" y="410" width="205" height="205" fill="#6db1cd"/>
    <rect x="820" y="410" width="204" height="205" fill="#95c8de"/>
    <rect x="0"   y="615" width="205" height="205" fill="#08405c"/>
    <rect x="205" y="615" width="205" height="205" fill="#156082"/>
    <rect x="410" y="615" width="205" height="205" fill="#2a7a9c"/>
    <rect x="615" y="615" width="205" height="205" fill="#4595b8"/>
    <rect x="820" y="615" width="204" height="205" fill="#6db1cd"/>
    <rect x="0"   y="820" width="205" height="204" fill="#032c43"/>
    <rect x="205" y="820" width="205" height="204" fill="#08405c"/>
    <rect x="410" y="820" width="205" height="204" fill="#156082"/>
    <rect x="615" y="820" width="205" height="204" fill="#2a7a9c"/>
    <rect x="820" y="820" width="204" height="204" fill="#4595b8"/>

    <!-- Glass mirror -->
    <rect width="1024" height="1024" fill="url(#mirrorGloss)"/>
    <ellipse cx="160" cy="100" rx="280" ry="160" fill="#ffffff" opacity="0.30"/>

    <!-- Folder back -->
    <g filter="url(#folderShadow)">
      <rect x="280" y="240" width="560" height="660" rx="56" ry="56" fill="url(#folderGrad)"/>
    </g>
    <g clip-path="url(#folderClip)">
      <rect x="280" y="240" width="560" height="200" fill="url(#topInnerHL)"/>
      <rect x="280" y="240" width="560" height="660" fill="url(#bottomInnerSH)"/>
    </g>
    <rect x="280" y="240" width="560" height="660" rx="56" ry="56" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>

    <!-- Page -->
    <g filter="url(#pageShadow)">
      <rect x="200" y="170" width="560" height="660" rx="56" ry="56" fill="url(#pageGrad)"/>
    </g>
    <g clip-path="url(#pageClip)">
      <rect x="200" y="170" width="560" height="180" fill="url(#pageTopHL)"/>
      <rect x="200" y="170" width="560" height="660" fill="url(#bottomInnerSH)" opacity="0.4"/>
    </g>
    <rect x="200" y="170" width="560" height="660" rx="56" ry="56" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.7"/>

    <!-- FLAT TEXT LINES (no embossing, just clean marks on paper) -->
    <g fill="#156082">
      <!-- Title line: thicker, full-width-ish -->
      <rect x="248" y="270" width="380" height="32" rx="6" ry="6"/>
      <!-- Body lines: thinner, varying widths -->
      <rect x="248" y="370" width="464" height="18" rx="4" ry="4"/>
      <rect x="248" y="420" width="420" height="18" rx="4" ry="4"/>
      <rect x="248" y="470" width="464" height="18" rx="4" ry="4"/>
      <rect x="248" y="520" width="320" height="18" rx="4" ry="4"/>
      <!-- Paragraph break -->
      <rect x="248" y="600" width="464" height="18" rx="4" ry="4"/>
      <rect x="248" y="650" width="380" height="18" rx="4" ry="4"/>
      <rect x="248" y="700" width="440" height="18" rx="4" ry="4"/>
      <rect x="248" y="750" width="240" height="18" rx="4" ry="4"/>
    </g>
  </g>
</svg>
