<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{{seo_head}}
<link rel="icon" type="image/png" href="/logos/Node%20Logo.png">
{{json_ld}}
<script>
  (function(){
    const c = document.cookie.match(/(?:^|; )darkMode=([^;]*)/);
    const dark = (c && c[1] === 'true') || localStorage.getItem('darkMode') === 'true';
    if (dark) document.documentElement.classList.add('dark-mode');
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&family=JetBrains+Mono:wght@400;500&display=block">
<link rel="stylesheet" href="/css/bundles/generic.css">
<link rel="stylesheet" href="/css/bundles/shared.css">
<link rel="stylesheet" href="/css/bundles/sandbox.css">
<link rel="stylesheet" href="/css/bundles/page.css">
<style>
  html, body {
    height: auto !important;
    overflow-y: auto !important;
    overflow-x: hidden !important;
  }
  body { background: var(--ad-bg); }
  html.dark-mode body { background: var(--ad-bg-dark); }

  .apps-page {
    width: 90%;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 0 80px;
  }
  @media (max-width: 768px) {
    .apps-page { width: 94%; }
  }

  .ai-intro {
    margin: 56px 0 var(--space-2xl);
    display: flex; flex-direction: column; gap: 12px;
    max-width: 760px;
  }
  .ai-intro h1 {
    margin: 0;
    font-family: var(--ad-font-display);
    font-size: clamp(28px, 3.4vw, 44px);
    font-weight: var(--ad-w-medium);
    line-height: var(--ad-lh-hero);
    letter-spacing: var(--ad-ls-hero);
    color: var(--ad-text-1);
  }
  .ai-intro .lead {
    font-family: var(--ad-font-body);
    font-size: 18px;
    font-weight: var(--ad-w-light);
    line-height: var(--ad-lh-row);
    color: var(--ad-text-1);
    margin: 0; max-width: 60ch;
  }

  .apps-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }
  .app-tile {
    background: var(--ad-card-dark);
    color: #fff;
    text-decoration: none;
    border-radius: 14px;
    overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 8px 22px rgba(30,52,72,0.16);
    transition: transform 0.18s, box-shadow 0.18s;
  }
  @media (hover: hover) {
    .app-tile:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 50px rgba(30,52,72,0.22);
    }
  }
  .app-tile .visual {
    aspect-ratio: 4 / 3;
    background: var(--ad-card-dark);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .app-tile .visual img {
    width: 100px; height: 100px;
    object-fit: contain;
    filter: drop-shadow(0 8px 22px rgba(0,0,0,0.45));
  }
  .app-tile .body {
    padding: 16px 18px 14px;
    display: flex; flex-direction: column; gap: 6px;
    flex: 1 1 auto;
  }
  .app-tile .surf {
    font-family: var(--ad-font-body);
    font-size: var(--ad-text-mini);
    font-weight: var(--ad-w-medium);
    text-transform: uppercase;
    letter-spacing: var(--ad-ls-mini);
    color: rgba(255,255,255,0.55);
  }
  .app-tile h3 {
    margin: 0;
    font-family: var(--ad-font-body);
    font-size: 16px;
    font-weight: var(--ad-w-card);
    line-height: 1.25;
    color: #fff;
  }
  .app-tile .claim {
    margin: 0;
    font-family: var(--ad-font-body);
    font-size: 13px;
    font-weight: var(--ad-w-light);
    line-height: 1.45;
    color: rgba(255,255,255,0.65);
  }
  .app-tile .more {
    margin-top: auto;
    padding-top: 8px;
    border-top: 1px solid var(--ad-border-card);
    font-family: var(--ad-font-body);
    font-size: var(--ad-text-mini);
    font-weight: var(--ad-w-medium);
    color: var(--ad-teal-light);
    text-transform: uppercase;
    letter-spacing: var(--ad-ls-mini);
  }

  .app-tile:focus-visible {
    outline: 2px solid var(--ad-teal);
    outline-offset: 2px;
    border-radius: 14px;
  }
  .app-tile:active { transform: scale(0.99); }
</style>
</head>
<body>

<script src="/shell.js"></script>

<div class="apps-page">

  <div class="ai-intro">
    <h1>{{section_lead}}</h1>
    <p class="lead">{{section_blurb}}</p>
  </div>

  <div class="apps-grid">{{tiles_html}}</div>

</div>
</body>
</html>
