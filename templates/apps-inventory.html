<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{{seo_head}}
<link rel="icon" type="image/png" href="/logos/Node%20Logo.png">
{{json_ld}}
<script>
  (function(){
    const c = document.cookie.match(/(?:^|; )darkMode=([^;]*)/);
    const dark = (c && c[1] === 'true') || localStorage.getItem('darkMode') === 'true';
    if (dark) document.documentElement.classList.add('dark-mode');
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&family=JetBrains+Mono:wght@400;500&display=block">
<link rel="stylesheet" href="/css/bundles/generic.css">
<link rel="stylesheet" href="/css/bundles/shared.css">
<link rel="stylesheet" href="/css/bundles/sandbox.css">
<link rel="stylesheet" href="/css/bundles/page.css">
<style>
  /* APPS INVENTORY — single-law derivative.
     Hero intro paragraph + a flagship hero (Section 2 derivative) +
     responsive grid of dark .rp-commands-card-style app tiles
     (same .app-card vocabulary as Section 3 of the home).
     NO uniform 3-col grid (banned). NO multi-tone gradients. */

  body { background: var(--ad-bg); overflow-y: auto; overflow-x: hidden; height: auto; }
  html.dark-mode body { background: var(--ad-bg-dark); }

  .docs-layout.ai-no-rails {
    grid-template-columns: minmax(0, 1fr) !important;
    width: 80% !important; max-width: none !important;
    margin-left: auto !important; margin-right: auto !important;
    padding-left: 0 !important; padding-right: 0 !important;
  }
  .docs-layout.ai-no-rails > .docs-left,
  .docs-layout.ai-no-rails > .docs-right { display: none !important; }
  @media (max-width: 1100px) {
    .docs-layout.ai-no-rails { width: 94% !important; }
  }

  .ai-intro {
    margin: 56px 0 var(--space-2xl);
    display: flex; flex-direction: column; gap: 12px;
    max-width: 760px;
  }
  .ai-intro h1 {
    margin: 0;
    font-family: var(--ad-font-display);
    font-size: clamp(28px, 3.4vw, 44px);
    font-weight: var(--ad-w-medium);
    line-height: var(--ad-lh-hero);
    letter-spacing: var(--ad-ls-hero);
    color: var(--ad-text-1);
  }
  .ai-intro .lead {
    font-family: var(--ad-font-body);
    font-size: 18px;
    font-weight: var(--ad-w-light);
    line-height: var(--ad-lh-row);
    color: var(--ad-text-1);
    margin: 0; max-width: 60ch;
  }
  .ai-intro p:not(.lead) {
    margin: 0;
    font-family: var(--ad-font-body);
    font-size: var(--ad-text-body);
    font-weight: var(--ad-w-light);
    line-height: var(--ad-lh-body);
    color: var(--ad-text-3);
    max-width: var(--ad-measure);
  }

  /* Flagship card — 2-col Section 2 derivative (copy left, painted
     frame right with the flagship app's 240px logo). */
  .ai-flagship {
    margin: 0 0 var(--space-2xl);
    display: grid;
    grid-template-columns: 1fr 1.1fr;
    gap: 0;
    align-items: stretch;
    border-radius: var(--radius-lg);
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    box-shadow: 0 22px 50px rgba(30,52,72,0.16);
    transition: transform 0.18s, box-shadow 0.18s;
  }
  @media (hover: hover) {
    .ai-flagship:hover {
      transform: translateY(-3px);
      box-shadow: 0 30px 70px rgba(30,52,72,0.22);
    }
  }
  .ai-flagship .copy {
    padding: clamp(40px, 5vw, 56px);
    display: flex; flex-direction: column; gap: 14px;
    justify-content: center;
    background: var(--ad-panel);
  }
  html.dark-mode .ai-flagship .copy { background: var(--ad-panel-dark); }
  .ai-flagship .badge {
    align-self: flex-start;
    background: rgba(21,96,130,0.10);
    color: var(--ad-teal);
    font-family: var(--ad-font-body);
    font-size: var(--ad-text-mini);
    font-weight: var(--ad-w-medium);
    padding: 5px 12px;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: var(--ad-ls-mini);
  }
  .ai-flagship h2 {
    margin: 0;
    font-family: var(--ad-font-display);
    font-size: clamp(28px, 3.4vw, 44px);
    font-weight: var(--ad-w-medium);
    line-height: var(--ad-lh-hero);
    letter-spacing: var(--ad-ls-hero);
    color: var(--ad-text-1);
    max-width: var(--ad-measure);
  }
  .ai-flagship .claim {
    margin: 0;
    font-family: var(--ad-font-body);
    font-size: var(--ad-text-body);
    font-weight: var(--ad-w-light);
    line-height: var(--ad-lh-body);
    color: var(--ad-text-3);
    max-width: var(--ad-measure);
  }
  .ai-flagship .arrow {
    align-self: flex-start;
    font-family: var(--ad-font-body);
    font-size: 13px;
    font-weight: var(--ad-w-medium);
    color: var(--ad-teal);
    margin-top: 6px;
  }
  .ai-flagship .visual {
    position: relative;
    min-height: 380px;
    overflow: hidden;
    background: #1a1a1a;
  }
  .ai-flagship .visual::before {
    content: ''; position: absolute; inset: 0;
    background: url('/images/revit-bg.png') center/cover no-repeat;
    z-index: 0;
  }
  .ai-flagship .visual::after {
    content: ''; position: absolute; inset: 0;
    background: var(--ad-painted-overlay);
    z-index: 0;
  }
  .ai-flagship .visual img {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
    width: 240px; height: 240px;
    object-fit: contain;
    border-radius: 36px;
    filter: drop-shadow(0 30px 60px rgba(0,0,0,0.55));
  }
  @media (max-width: 1100px) {
    .ai-flagship { grid-template-columns: 1fr; }
    .ai-flagship .visual { aspect-ratio: 16/10; min-height: auto; }
    .ai-flagship .visual img { width: 180px; height: 180px; }
  }

  /* Apps grid — same .app-card vocabulary as Section 3 of the home */
  .apps-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
  }
  .app-tile {
    background: var(--ad-card-dark);
    color: #fff;
    text-decoration: none;
    border-radius: 14px;
    overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 8px 22px rgba(30,52,72,0.16);
    transition: transform 0.18s, box-shadow 0.18s;
  }
  @media (hover: hover) {
    .app-tile:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 50px rgba(30,52,72,0.22);
    }
  }
  .app-tile .visual {
    position: relative;
    aspect-ratio: 16 / 9;
    background: rgba(255,255,255,0.05);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .app-tile .visual::before {
    content: ''; position: absolute; inset: 0;
    background: url('/images/revit-bg.png') center/cover no-repeat;
    opacity: 0.12; z-index: 0;
  }
  .app-tile .visual img {
    position: relative; z-index: 1;
    width: 100px; height: 80px;
    object-fit: contain;
    filter: drop-shadow(0 8px 22px rgba(0,0,0,0.45));
  }
  .app-tile .body {
    padding: 18px 20px 14px;
    display: flex; flex-direction: column; gap: 8px;
    flex: 1 1 auto;
  }
  .app-tile .surf {
    font-family: var(--ad-font-body);
    font-size: var(--ad-text-mini);
    font-weight: var(--ad-w-medium);
    text-transform: uppercase;
    letter-spacing: var(--ad-ls-mini);
    color: rgba(255,255,255,0.55);
  }
  .app-tile h3 {
    margin: 0;
    font-family: var(--ad-font-body);
    font-size: var(--ad-text-card);
    font-weight: var(--ad-w-card);
    line-height: 1.25;
    color: #fff;
  }
  .app-tile .claim {
    margin: 0;
    font-family: var(--ad-font-body);
    font-size: 14px;
    font-weight: var(--ad-w-light);
    line-height: 1.45;
    color: rgba(255,255,255,0.65);
  }
  .app-tile .more {
    margin-top: auto;
    padding-top: 10px;
    border-top: 1px solid var(--ad-border-card);
    font-family: var(--ad-font-body);
    font-size: var(--ad-text-mini);
    font-weight: var(--ad-w-medium);
    color: var(--ad-teal-light);
    text-transform: uppercase;
    letter-spacing: var(--ad-ls-mini);
  }

  .ai-stamp {
    margin-top: 48px;
    padding: 14px 18px;
    background: var(--ad-panel);
    border: 1px solid var(--ad-border);
    border-radius: var(--radius-sm);
    font-family: var(--ad-font-mono);
    font-size: 12px;
    color: var(--ad-text-5);
  }
</style>
</head>
<body>

<script src="/sandbox/shell.js"></script>

<div class="docs-layout wide ai-no-rails">
<aside class="docs-left"></aside>
<main class="docs-content">

  <div class="ai-intro">
    <h1>{{section_lead}}</h1>
    <p class="lead">{{section_blurb}}</p>
  </div>

  {{flagship_html}}

  <div class="apps-grid">{{tiles_html}}</div>

  <p class="ai-stamp">
    Auto-generated <code>{{generated_at}}</code> from <code>sandbox/data/apps.json</code> ({{count}} apps).
  </p>

</main>
<aside class="docs-right"></aside>
</div>

<script src="/sandbox/docs-shell.js"></script>
</body>
</html>
