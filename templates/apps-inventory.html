<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{{seo_head}}
<link rel="icon" type="image/png" href="/logos/Node%20Logo.png">
{{json_ld}}
<script>
  (function(){
    const c = document.cookie.match(/(?:^|; )darkMode=([^;]*)/);
    const dark = (c && c[1] === 'true') || localStorage.getItem('darkMode') === 'true';
    if (dark) document.documentElement.classList.add('dark-mode');
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&family=JetBrains+Mono:wght@400;500&display=block">
<link rel="stylesheet" href="/css/bundles/generic.css">
<link rel="stylesheet" href="/css/bundles/shared.css">
<link rel="stylesheet" href="/css/bundles/sandbox.css">
<link rel="stylesheet" href="/css/bundles/page.css">
<style>
  html, body {
    height: auto !important;
    overflow-y: auto !important;
    overflow-x: hidden !important;
  }
  body { background: var(--ad-bg); }
  html.dark-mode body { background: var(--ad-bg-dark); }

  .apps-page {
    width: 90%;
    max-width: 1200px;
    margin: 0 auto;
    padding: var(--shell-padding-top, 120px) 0 100px;
  }
  @media (max-width: 768px) {
    .apps-page { width: 94%; padding-top: 100px; }
  }

  .ai-intro {
    margin: 0 0 56px;
    display: flex; flex-direction: column; gap: 12px;
    max-width: 760px;
  }
  .ai-intro h1 {
    margin: 0;
    font-family: var(--ad-font-display);
    font-size: clamp(28px, 3.4vw, 44px);
    font-weight: var(--ad-w-medium);
    line-height: var(--ad-lh-hero);
    letter-spacing: var(--ad-ls-hero);
    color: var(--ad-text-1);
  }
  .ai-intro .lead {
    font-family: var(--ad-font-body);
    font-size: 18px;
    font-weight: var(--ad-w-light);
    line-height: var(--ad-lh-row);
    color: var(--ad-text-3);
    margin: 0; max-width: 60ch;
  }

  .apps-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 40px 32px;
  }
  @media (max-width: 600px) {
    .apps-grid { grid-template-columns: repeat(2, 1fr); gap: 32px 20px; }
  }

  .app-tile {
    text-decoration: none;
    color: inherit;
    display: flex; flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 8px;
    border-radius: 16px;
    transition: transform 0.22s ease, background 0.22s ease;
  }
  @media (hover: hover) {
    .app-tile:hover {
      transform: translateY(-4px);
      background: rgba(21,96,130,0.04);
    }
    html.dark-mode .app-tile:hover {
      background: rgba(255,255,255,0.05);
    }
  }

  .app-tile .icon-wrap {
    width: 120px; height: 120px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
    position: relative;
    border-radius: 28px;
    overflow: hidden;
  }
  .app-tile .icon-wrap img {
    width: 100%; height: 100%;
    object-fit: contain;
    border-radius: 28px;
    transition: filter 0.35s ease, transform 0.35s ease;
    filter: drop-shadow(0 6px 16px rgba(0,0,0,0.18));
  }
  .app-tile .icon-wrap::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: 28px;
    background: linear-gradient(135deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0) 50%, rgba(255,255,255,0) 100%);
    opacity: 0;
    transition: opacity 0.35s ease;
    pointer-events: none;
  }
  @media (hover: hover) {
    .app-tile:hover .icon-wrap img {
      filter: drop-shadow(0 8px 24px rgba(21,96,130,0.35)) brightness(1.12);
      transform: scale(1.06);
    }
    .app-tile:hover .icon-wrap::after {
      opacity: 1;
    }
  }

  .app-tile h3 {
    margin: 0 0 4px;
    font-family: var(--ad-font-body);
    font-size: 15px;
    font-weight: var(--ad-w-medium);
    line-height: 1.3;
    color: var(--ad-text-1);
  }
  .app-tile .surf {
    font-family: var(--ad-font-body);
    font-size: 11px;
    font-weight: var(--ad-w-light);
    color: var(--ad-text-5);
    margin-bottom: 6px;
  }
  .app-tile .claim {
    margin: 0;
    font-family: var(--ad-font-body);
    font-size: 13px;
    font-weight: var(--ad-w-light);
    line-height: 1.5;
    color: var(--ad-text-3);
  }
  .app-tile .arrow {
    margin-top: 10px;
    font-family: var(--ad-font-body);
    font-size: 12px;
    font-weight: var(--ad-w-medium);
    color: var(--ad-teal);
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.22s ease, transform 0.22s ease;
  }
  @media (hover: hover) {
    .app-tile:hover .arrow {
      opacity: 1;
      transform: translateY(0);
    }
  }
  @media (hover: none) {
    .app-tile .arrow { opacity: 1; transform: none; }
  }

  .app-tile:focus-visible {
    outline: 2px solid var(--ad-teal);
    outline-offset: 4px;
    border-radius: 16px;
  }
  .app-tile:active { transform: scale(0.97); }
</style>
</head>
<body>

<script src="/shell.js"></script>

<div class="apps-page">

  <div class="ai-intro">
    <h1>{{section_lead}}</h1>
    <p class="lead">{{section_blurb}}</p>
  </div>

  <div class="apps-grid">{{tiles_html}}</div>

</div>
</body>
</html>
