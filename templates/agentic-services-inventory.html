<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{{seo_head}}
<link rel="icon" type="image/png" href="/logos/Node%20Logo.png">
{{json_ld}}
<script>
  (function(){
    const c = document.cookie.match(/(?:^|; )darkMode=([^;]*)/);
    const dark = (c && c[1] === 'true') || localStorage.getItem('darkMode') === 'true';
    if (dark) document.documentElement.classList.add('dark-mode');
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&family=JetBrains+Mono:wght@400;500&display=block">
<link rel="stylesheet" href="/css/bundles/generic.css">
<link rel="stylesheet" href="/css/bundles/shared.css">
<link rel="stylesheet" href="/css/bundles/sandbox.css">
<link rel="stylesheet" href="/css/bundles/page.css">
<style>
  /* AGENTIC SERVICES INVENTORY — same vocabulary as apps-inventory.
     One flagship section + grid of dark .app-tile derivatives. */

  body { background: var(--ad-bg); overflow-y: auto; overflow-x: hidden; height: auto; }
  html.dark-mode body { background: var(--ad-bg-dark); }

  .docs-layout.svci-no-rails {
    grid-template-columns: minmax(0, 1fr) !important;
    width: 80% !important; max-width: none !important;
    margin-left: auto !important; margin-right: auto !important;
    padding-left: 0 !important; padding-right: 0 !important;
  }
  .docs-layout.svci-no-rails > .docs-left,
  .docs-layout.svci-no-rails > .docs-right { display: none !important; }
  @media (max-width: 1100px) {
    .docs-layout.svci-no-rails { width: 94% !important; }
  }

  .ai-intro {
    margin: 56px 0 var(--space-2xl);
    display: flex; flex-direction: column; gap: 12px;
    max-width: 760px;
  }
  .ai-intro h1 {
    margin: 0;
    font-family: var(--ad-font-display);
    font-size: clamp(28px, 3.4vw, 44px);
    font-weight: var(--ad-w-medium);
    line-height: var(--ad-lh-hero);
    letter-spacing: var(--ad-ls-hero);
    color: var(--ad-text-1);
  }
  .ai-intro .lead {
    font-family: var(--ad-font-body);
    font-size: 18px;
    font-weight: var(--ad-w-light);
    line-height: var(--ad-lh-row);
    color: var(--ad-text-1);
    margin: 0; max-width: 60ch;
  }

  /* Section labels between managed + email rows */
  .ai-section-label {
    margin: var(--space-2xl) 0 var(--space-md);
    font-family: var(--ad-font-display);
    font-size: 22px;
    font-weight: var(--ad-w-medium);
    line-height: 1.2;
    letter-spacing: var(--ad-ls-hero);
    color: var(--ad-text-1);
    padding-top: var(--space-md);
    border-top: 1px solid var(--ad-border);
  }

  /* Tile grid — same .app-tile vocabulary as apps-inventory */
  .svc-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
  }
  .svc-tile {
    background: var(--ad-card-dark);
    color: #fff;
    text-decoration: none;
    border-radius: 14px;
    overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 8px 22px rgba(30,52,72,0.16);
    transition: transform 0.18s, box-shadow 0.18s;
  }
  @media (hover: hover) {
    .svc-tile:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 50px rgba(30,52,72,0.22);
    }
  }
  .svc-tile .visual {
    position: relative;
    aspect-ratio: 16 / 9;
    background: rgba(255,255,255,0.05);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .svc-tile .visual::before {
    content: ''; position: absolute; inset: 0;
    background: url('/images/revit-bg.png') center/cover no-repeat;
    opacity: 0.12; z-index: 0;
  }
  .svc-tile .visual svg {
    position: relative; z-index: 1;
    width: 56px; height: 56px;
    color: var(--ad-teal-light);
    filter: drop-shadow(0 8px 22px rgba(0,0,0,0.45));
  }
  .svc-tile .body {
    padding: 18px 20px 14px;
    display: flex; flex-direction: column; gap: 8px;
    flex: 1 1 auto;
  }
  .svc-tile .surf {
    font-family: var(--ad-font-body);
    font-size: var(--ad-text-mini);
    font-weight: var(--ad-w-medium);
    text-transform: uppercase;
    letter-spacing: var(--ad-ls-mini);
    color: rgba(255,255,255,0.55);
  }
  .svc-tile h3 {
    margin: 0;
    font-family: var(--ad-font-body);
    font-size: var(--ad-text-card);
    font-weight: var(--ad-w-card);
    line-height: 1.25;
    color: #fff;
  }
  .svc-tile .claim {
    margin: 0;
    font-family: var(--ad-font-body);
    font-size: 14px;
    font-weight: var(--ad-w-light);
    line-height: 1.45;
    color: rgba(255,255,255,0.65);
  }
  .svc-tile .email-line {
    margin-top: 8px;
    font-family: var(--ad-font-mono);
    font-size: 13px;
    color: var(--ad-teal-light);
  }
  .svc-tile .more {
    margin-top: auto;
    padding-top: 10px;
    border-top: 1px solid var(--ad-border-card);
    font-family: var(--ad-font-body);
    font-size: var(--ad-text-mini);
    font-weight: var(--ad-w-medium);
    color: var(--ad-teal-light);
    text-transform: uppercase;
    letter-spacing: var(--ad-ls-mini);
  }

  .svci-stamp {
    margin-top: 48px;
    padding: 14px 18px;
    background: var(--ad-panel);
    border: 1px solid var(--ad-border);
    border-radius: var(--radius-sm);
    font-family: var(--ad-font-mono);
    font-size: 12px;
    color: var(--ad-text-5);
  }

  /* ── INTERACTIVE STATES — Phase 8.7.4 / 8.7.5 ───────────────────── */
  .ai-flagship:focus-visible,
  .svc-tile:focus-visible {
    outline: 2px solid var(--ad-teal);
    outline-offset: 2px;
    border-radius: 14px;
  }
  .ai-flagship:active,
  .svc-tile:active { transform: scale(0.99); }
</style>
</head>
<body>

<script src="/shell.js"></script>

<div class="docs-layout wide svci-no-rails">
<aside class="docs-left"></aside>
<main class="docs-content">

  <div class="ai-intro">
    <h1>{{section_lead}}</h1>
    <p class="lead">{{section_blurb}}</p>
  </div>

  {{flagship_html}}

  <h2 class="ai-section-label">Managed services</h2>
  <div class="svc-grid">{{managed_tiles_html}}</div>

  <h2 class="ai-section-label">Email services</h2>
  <div class="svc-grid">{{email_tiles_html}}</div>

  <p class="svci-stamp">
    Auto-generated <code>{{generated_at}}</code> from <code>sandbox/data/agentic-services.json</code> ({{count}} services).
  </p>

</main>
<aside class="docs-right"></aside>
</div>

<script src="/docs-shell.js"></script>
</body>
</html>
