<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{{seo_head}}
<link rel="icon" type="image/png" href="/logos/Node%20Logo.png">
{{json_ld}}
<script>
  (function(){
    const c = document.cookie.match(/(?:^|; )darkMode=([^;]*)/);
    const dark = (c && c[1] === 'true') || localStorage.getItem('darkMode') === 'true';
    if (dark) document.documentElement.classList.add('dark-mode');
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=block">
<link rel="stylesheet" href="/css/bundles/generic.css">
<link rel="stylesheet" href="/css/bundles/shared.css">
<link rel="stylesheet" href="/css/bundles/sandbox.css">
<link rel="stylesheet" href="/css/bundles/page.css">
<style>
  /* AGENTIC SERVICES INVENTORY ─────────────────────────────────────────
     Same crown-jewel layout as Apps, with a service-specific palette
     (deeper green/teal to differentiate "managed service" from "app").
  */

  .svc-intro { margin-bottom: var(--space-2xl); }
  .svc-intro .lead {
    font-size: 28px; font-weight: 300; line-height: 1.35; letter-spacing: -0.015em;
    color: var(--text); margin: 0 0 var(--space-md); max-width: 900px;
  }
  .svc-intro p {
    font-size: 16px; line-height: 1.65; color: var(--text-muted);
    max-width: 820px; margin: 0;
  }

  .flagship-svc {
    display: grid; grid-template-columns: 1.15fr 1fr; gap: 0;
    background: linear-gradient(135deg, #0e2a1f 0%, #1a4a3a 50%, #2e8b6f 100%);
    border-radius: var(--radius-lg); overflow: hidden;
    box-shadow: 0 20px 60px rgba(46,139,111,0.20);
    margin-bottom: var(--space-2xl);
    text-decoration: none; color: #fff;
    transition: transform 0.25s, box-shadow 0.25s;
  }
  .flagship-svc:hover { transform: translateY(-4px); box-shadow: 0 28px 70px rgba(46,139,111,0.28); }
  .flagship-svc .copy { padding: 48px 48px 56px; display: flex; flex-direction: column; gap: 20px; }
  .flagship-svc .badge {
    display: inline-block; align-self: flex-start;
    background: rgba(255,255,255,0.16); color: #fff;
    font-size: 11px; font-weight: 700; padding: 6px 12px; border-radius: 999px;
    text-transform: uppercase; letter-spacing: 0.10em;
    backdrop-filter: blur(8px);
  }
  .flagship-svc h2 {
    font-family: 'Inter', sans-serif;
    font-size: 44px; font-weight: 600; line-height: 1.1; letter-spacing: -0.025em;
    margin: 0; color: #fff;
  }
  .flagship-svc .claim {
    font-size: 22px; font-weight: 300; line-height: 1.4; letter-spacing: -0.01em;
    color: rgba(255,255,255,0.92); margin: 0;
  }
  .flagship-svc .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; margin-top: 8px; }
  .flagship-svc .stats .stat .num { font-size: 28px; font-weight: 600; line-height: 1.1; letter-spacing: -0.02em; color: #fff; }
  .flagship-svc .stats .stat .lbl { display: block; font-size: 11px; color: rgba(255,255,255,0.70); margin-top: 4px; line-height: 1.35; }
  .flagship-svc .arrow {
    align-self: flex-start; margin-top: 12px;
    background: #fff; color: #2e8b6f;
    padding: 12px 22px; border-radius: 999px;
    font-size: 14px; font-weight: 600;
    transition: transform 0.18s;
  }
  .flagship-svc:hover .arrow { transform: translateX(4px); }
  .flagship-svc .visual {
    position: relative; min-height: 380px;
    background: linear-gradient(135deg, rgba(0,0,0,0.20), rgba(0,0,0,0.45)),
                radial-gradient(circle at 30% 30%, rgba(255,255,255,0.10), transparent);
    display: flex; align-items: center; justify-content: center;
  }
  .flagship-svc .visual .seal {
    width: 140px; height: 140px; border-radius: 50%;
    background: rgba(255,255,255,0.10);
    border: 2px solid rgba(255,255,255,0.30);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #fff; text-align: center;
  }
  .flagship-svc .visual .seal .big { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; }
  .flagship-svc .visual .seal .small { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.82; margin-top: 4px; }

  @media (max-width: 900px) {
    .flagship-svc { grid-template-columns: 1fr; }
    .flagship-svc .copy { padding: 32px; gap: 16px; }
    .flagship-svc h2 { font-size: 32px; }
    .flagship-svc .claim { font-size: 18px; }
    .flagship-svc .stats { grid-template-columns: repeat(2, 1fr); }
    .flagship-svc .visual { min-height: 220px; }
  }

  .svc-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: var(--space-xl); }
  .svc-tile {
    display: flex; flex-direction: column;
    background: var(--bg-card);
    border: 1px solid var(--border); border-radius: var(--radius-lg);
    overflow: hidden; text-decoration: none; color: var(--text);
    transition: transform 0.22s, box-shadow 0.22s, border-color 0.22s;
    box-shadow: var(--shadow-sm);
  }
  .svc-tile:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); border-color: #2e8b6f; }
  .svc-tile .visual {
    height: 180px; position: relative;
    background: linear-gradient(135deg, #1a4a3a, #0e2a1f);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .svc-tile .visual::after {
    content: ''; position: absolute; inset: 0; opacity: 0.30;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.18), transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(46,139,111,0.55), transparent 50%);
  }
  .svc-tile .visual img {
    position: relative; z-index: 1;
    width: 72px; height: 72px; object-fit: cover; border-radius: var(--radius-md);
    box-shadow: 0 8px 24px rgba(0,0,0,0.30);
  }
  .svc-tile .body { padding: 24px 28px 28px; display: flex; flex-direction: column; gap: 12px; flex: 1; }
  .svc-tile .badge {
    align-self: flex-start;
    font-size: 11px; padding: 4px 10px; border-radius: 999px;
    background: rgba(46,139,111,0.10); color: #2e7d32; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .svc-tile h3 {
    margin: 0; font-size: 22px; font-weight: 600; letter-spacing: -0.015em;
    color: var(--text);
  }
  .svc-tile .claim { font-size: 16px; line-height: 1.5; color: var(--text); margin: 0; }
  .svc-tile .outcomes { display: flex; flex-wrap: wrap; gap: 18px; padding-top: 12px; border-top: 1px solid var(--border); margin-top: auto; }
  .svc-tile .outcomes .stat .num { display: block; font-size: 18px; font-weight: 600; color: #2e8b6f; line-height: 1.1; }
  .svc-tile .outcomes .stat .lbl { display: block; font-size: 11px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>

<script src="/sandbox/shell.js"></script>

<div class="docs-layout wide">
<aside class="docs-left"></aside>
<main class="docs-content">

  <div class="svc-intro">
    <h1 style="font-size:48px;font-weight:500;letter-spacing:-0.025em;margin:0 0 12px;">{{section_lead}}</h1>
    <p class="lead">{{section_blurb}}</p>
  </div>

  {{flagship_html}}

  <div class="svc-grid">{{tiles_html}}</div>

  <p style="margin-top:48px;padding:14px 18px;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;color:var(--text-muted);">
    Auto-generated <code>{{generated_at}}</code> from <code>sandbox/data/agentic-services.json</code> ({{count}} services).
    Re-run with <code>adelphos_CLI auto-all</code>.
  </p>

</main>
<aside class="docs-right"></aside>
</div>

<script src="/sandbox/docs-shell.js"></script>
</body>
</html>
