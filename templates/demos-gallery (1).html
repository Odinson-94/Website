<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Demos — Adelphos AI</title>
<link rel="icon" type="image/png" href="/logos/Node%20Logo.png">
<script>
  (function(){
    const c = document.cookie.match(/(?:^|; )darkMode=([^;]*)/);
    const dark = (c && c[1] === 'true') || localStorage.getItem('darkMode') === 'true';
    if (dark) document.documentElement.classList.add('dark-mode');
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=block">
<link rel="stylesheet" href="/css/bundles/generic.css">
<link rel="stylesheet" href="/css/bundles/shared.css">
<link rel="stylesheet" href="/css/bundles/sandbox.css">
<link rel="stylesheet" href="/css/bundles/page.css">
</head>
<body>

<script src="/sandbox/shell.js"></script>

<div class="docs-layout wide">
<aside class="docs-left"></aside>
<main class="docs-content">

  <h1 style="font-size:44px;font-weight:500;letter-spacing:-0.02em;margin-bottom:8px;">Demos</h1>
  <p style="font-size:18px;line-height:1.55;color:var(--text-muted);max-width:760px;margin-bottom:32px;">
    Every workflow, on video. {{count}} demos across {{cat_count}} categories.
    Click any card to open the full Cursor-docs style detail page.
  </p>

  {{sections_html}}

  <p style="margin-top:48px;padding:14px 18px;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;color:var(--text-muted);">
    Auto-generated <code>{{generated_at}}</code> from <code>sandbox/data/demos.json</code> ({{count}} demos).
    Re-run with <code>adelphos_CLI build gallery demos</code>.
  </p>

</main>
<aside class="docs-right"></aside>
</div>

<script src="/sandbox/docs-shell.js"></script>
</body>
</html>
