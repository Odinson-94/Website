<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clash Manager — ADELPHOS AI</title>
  <!-- Dark mode early detection -->
  <script>
    function getDarkModeCookie() {
      const match = document.cookie.match(/(?:^|; )darkMode=([^;]*)/);
      return match ? match[1] === 'true' : false;
    }
    const darkModeEnabled = getDarkModeCookie() || localStorage.getItem('darkMode') === 'true';
    if (darkModeEnabled) {
      document.documentElement.classList.add('dark-mode');
    }
  </script>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=block">
  <!-- Styles -->
  <link rel="stylesheet" href="css/shared-styles.css">
  <link rel="stylesheet" href="css/clash-manager.css">
</head>
<body class="clash-manager-body">
  <div class="clash-manager">
    <!-- Header Bar -->
    <div class="clash-header">
      <div class="clash-header-left">
        <span class="clash-icon">⚠️</span>
        <h1 class="clash-title">Clash Manager</h1>
        <span class="clash-count" id="clashCount">0 clashes</span>
      </div>
      <div class="clash-header-right">
        <button class="clash-header-btn" id="refreshBtn" title="Refresh clashes">↻</button>
        <button class="clash-header-btn close-btn" id="closeBtn" title="Close">×</button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="clash-content">
      <!-- Left Sidebar: Clash Categories/Tests -->
      <div class="clash-sidebar">
        <div class="clash-sidebar-header">
          <span>Tests</span>
        </div>
        <div class="clash-sidebar-list" id="clashCategoryList">
          <!-- Categories populated by JS -->
        </div>
      </div>

      <!-- Main Panel -->
      <div class="clash-main">
        <!-- Results List Row -->
        <div class="clash-results-section">
          <div class="clash-results-header">
            <span class="results-title">Results</span>
            <div class="results-filter">
              <select id="statusFilter" class="status-filter">
                <option value="all">All Status</option>
                <option value="new">New</option>
                <option value="active">Active</option>
                <option value="reviewed">Reviewed</option>
                <option value="approved">Approved</option>
                <option value="resolved">Resolved</option>
              </select>
            </div>
          </div>
          <div class="clash-results-list" id="clashResultsList">
            <!-- Results populated by JS -->
          </div>
        </div>

        <!-- Before/After Views Row -->
        <div class="clash-views-section">
          <div class="clash-view-panel">
            <div class="view-header">
              <span>Before</span>
            </div>
            <div class="view-content" id="beforeView">
              <div class="view-placeholder">
                <span class="placeholder-icon">🔍</span>
                <span class="placeholder-text">Select a clash to view</span>
              </div>
            </div>
          </div>
          <div class="clash-view-panel">
            <div class="view-header">
              <span>After</span>
            </div>
            <div class="view-content" id="afterView">
              <div class="view-placeholder">
                <span class="placeholder-icon">✓</span>
                <span class="placeholder-text">Resolution preview</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Item Details Row -->
        <div class="clash-details-section">
          <div class="clash-item-panel">
            <div class="item-header">
              <span class="item-header-icon" style="background: #e74c3c;">1</span>
              <span>Item 1</span>
            </div>
            <div class="item-details" id="item1Details">
              <div class="detail-row">
                <span class="detail-label">Element ID:</span>
                <span class="detail-value" id="item1ElementId">—</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Source File:</span>
                <span class="detail-value" id="item1SourceFile">—</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Category:</span>
                <span class="detail-value" id="item1Category">—</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Name:</span>
                <span class="detail-value" id="item1Name">—</span>
              </div>
            </div>
          </div>
          <div class="clash-item-panel">
            <div class="item-header">
              <span class="item-header-icon" style="background: #3498db;">2</span>
              <span>Item 2</span>
            </div>
            <div class="item-details" id="item2Details">
              <div class="detail-row">
                <span class="detail-label">Element ID:</span>
                <span class="detail-value" id="item2ElementId">—</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Source File:</span>
                <span class="detail-value" id="item2SourceFile">—</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Category:</span>
                <span class="detail-value" id="item2Category">—</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Name:</span>
                <span class="detail-value" id="item2Name">—</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer: Action Buttons -->
    <div class="clash-footer">
      <div class="footer-left">
        <span class="clash-status" id="clashStatus">Select a clash to begin</span>
      </div>
      <div class="footer-right">
        <button class="clash-action-btn solve-btn" id="solveClashBtn" disabled>
          <span class="btn-icon">🔧</span>
          Solve Clash
        </button>
        <button class="clash-action-btn accept-btn" id="acceptBtn" disabled>
          <span class="btn-icon">✓</span>
          Accept
        </button>
        <button class="clash-action-btn reject-btn" id="rejectBtn" disabled>
          <span class="btn-icon">✗</span>
          Reject
        </button>
        <button class="clash-action-btn cancel-btn" id="cancelBtn">
          Cancel
        </button>
      </div>
    </div>
  </div>

  <script src="js/clash-manager.js"></script>
</body>
</html>
